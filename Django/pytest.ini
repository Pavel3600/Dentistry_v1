[pytest]
DJANGO_SETTINGS_MODULE = django_app.test_settings
python_files = test_*.py
asyncio_mode = auto
addopts = --strict-markers --tb=short --cov=app --cov-report=term-missing --cov-report=html --cov-config=.coveragerc
markers =
    selenium: marks tests as selenium (deselect with '-m "not selenium"')
