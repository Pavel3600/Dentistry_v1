<form method="POST">

    {% csrf_token %}

    <p>
        <label>Enter a name</label><br>
        <input type="text" name="name" value="{{ person.name }}" />
    </p>

    <p>
        <label>Enter your age</label><br>
        <input type="number" name="age" value="{{ person.age }}" />
    </p>

    <input type="submit" value="Save" />

</form>

<table>

    <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Age</th>
        <th>Actions</th>
    </tr>

    {% for person in people %}

    <tr>
        <td>{{ person.id }}</td>
        <td>{{ person.name }}</td>
        <td>{{ person.age }}</td>

        <td>
            <a href="edit/{{ person.id }}">Edit</a> |
            <a href="delete/{{ person.id }}">Delete</a>
        </td>
    </tr>

    {% endfor %}

</table>
