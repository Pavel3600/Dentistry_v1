{% extends 'base.html' %}
{% block title %}Статус интеграции с FastAPI{% endblock %}
{% block content %}
<h2><i class="fas fa-plug"></i> Интеграция с FastAPI</h2>

<div id="status-container" class="mt-4">
    <div class="text-center">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Загрузка...</span>
        </div>
        <p>Проверка подключения к FastAPI...</p>
    </div>
</div>

<script>
async function checkFastAPIStatus() {
    try {
        const response = await fetch('/fastapi/full-status/');
        const data = await response.json();
        
        const container = document.getElementById('status-container');
        
        if (data.fastapi.online) {
            container.innerHTML = `
                <div class="alert alert-success">
                    <h4><i class="fas fa-check-circle"></i> FastAPI работает!</h4>
                    <p>URL: ${data.fastapi.url}</p>
                    <p>${data.message}</p>
                    <hr>
                    <h5>Детали:</h5>
                    <ul>
                        <li>Услуги: ${data.services.available ? '✅ Доступны (' + data.services.count + ' шт.)' : '❌ Недоступны'}</li>
                    </ul>
                </div>
                <div class="card mt-3">
                    <div class="card-header bg-primary text-white">
                        <i class="fas fa-exchange-alt"></i> Доступные действия
                    </div>
                    <div class="card-body">
                        <button onclick="syncPatients()" class="btn btn-primary">Синхронизировать пациентов</button>
                        <button onclick="checkServices()" class="btn btn-info">Проверить услуги</button>
                    </div>
                </div>
                <div id="result" class="mt-3"></div>
            `;
        } else {
            container.innerHTML = `
                <div class="alert alert-danger">
                    <h4><i class="fas fa-exclamation-triangle"></i> FastAPI НЕ ДОСТУПЕН!</h4>
                    <p><strong>Ошибка:</strong> ${data.fastapi.message}</p>
                    <p>URL: ${data.fastapi.url}</p>
                    <hr>
                    <h5>Возможные причины:</h5>
                    <ul>
                        <li>FastAPI сервер не запущен</li>
                        <li>Неправильный порт (должен быть ${data.fastapi.url})</li>
                        <li>Брандмауэр блокирует соединение</li>
                    </ul>
                    <hr>
                    <h5>Как исправить:</h5>
                    <ol>
                        <li>Убедитесь, что FastAPI запущен: <code>cd "Reast Api Dentistry" && uvicorn app.main:main_app --reload</code></li>
                        <li>Проверьте, что порт 8000 свободен</li>
                        <li>Проверьте настройки в .env файле</li>
                    </ol>
                </div>
            `;
        }
    } catch (error) {
        document.getElementById('status-container').innerHTML = `
            <div class="alert alert-danger">
                <h4><i class="fas fa-exclamation-triangle"></i> Ошибка проверки статуса!</h4>
                <p>${error.message}</p>
            </div>
        `;
    }
}

async function syncPatients() {
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = '<div class="alert alert-info">Синхронизация...</div>';
    
    try {
        const response = await fetch('/fastapi/patients/');
        const data = await response.json();
        
        if (data.success) {
            resultDiv.innerHTML = `
                <div class="alert alert-success">
                    <i class="fas fa-check"></i> Пациенты успешно получены из FastAPI!<br>
                    Найдено записей: ${data.data.length}
                </div>
            `;
        } else {
            resultDiv.innerHTML = `
                <div class="alert alert-warning">
                    <i class="fas fa-exclamation-triangle"></i> ${data.error}
                </div>
            `;
        }
    } catch (error) {
        resultDiv.innerHTML = `
            <div class="alert alert-danger">
                Ошибка: ${error.message}
            </div>
        `;
    }
}

async function checkServices() {
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = '<div class="alert alert-info">Загрузка услуг...</div>';
    
    try {
        const response = await fetch('/fastapi/services/');
        const data = await response.json();
        
        if (data.success) {
            let servicesHtml = '<div class="alert alert-success">Услуги из FastAPI:<br><ul>';
            data.data.slice(0, 10).forEach(service => {
                servicesHtml += `<li>${service.code} - ${service.name}</li>`;
            });
            if (data.data.length > 10) {
                servicesHtml += `<li>... и еще ${data.data.length - 10} услуг</li>`;
            }
            servicesHtml += '</ul></div>';
            resultDiv.innerHTML = servicesHtml;
        } else {
            resultDiv.innerHTML = `
                <div class="alert alert-warning">
                    <i class="fas fa-exclamation-triangle"></i> ${data.error}
                </div>
            `;
        }
    } catch (error) {
        resultDiv.innerHTML = `
            <div class="alert alert-danger">
                Ошибка: ${error.message}
            </div>
        `;
    }
}

// Загружаем статус при загрузке страницы
document.addEventListener('DOMContentLoaded', checkFastAPIStatus);
</script>

<style>
    .alert {
        margin-top: 20px;
    }
    code {
        background: #f4f4f4;
        padding: 2px 5px;
        border-radius: 3px;
    }
</style>
{% endblock %}
