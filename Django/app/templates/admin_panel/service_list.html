{% extends 'base.html' %}
{% block content %}
<h2>Стоматологические услуги</h2>
<a href="{% url 'app:service_create' %}" class="btn btn-success mb-3">Добавить услугу</a>
<table class="table table-bordered">
    <thead><tr><th>Код</th><th>Название</th><th>Стоимость</th><th>Длительность</th><th>Действия</th></tr></thead>
    <tbody>
        {% for s in services %}
        <tr>
            <td>{{ s.code }}</td><td>{{ s.name }}</td><td>{{ s.cost }}</td><td>{{ s.duration_minutes }} мин</td>
            <td>
                <a href="{% url 'app:service_edit' s.id %}" class="btn btn-sm btn-warning">Изменить</a>
                <a href="{% url 'app:service_delete' s.id %}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')">Удалить</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="5">Нет данных</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
