{% extends 'base.html' %}
{% block title %}Код МКБ{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card card-custom p-4">
      <h3 class="mb-4 text-teal"><i class="fas fa-book-medical"></i> Код МКБ</h3>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {{ field.errors }}
          </div>
        {% endfor %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Сохранить</button>
          <a href="{% url 'app:mkb_list' %}" class="btn btn-outline-secondary">Отмена</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
