{% extends 'base.html' %}
{% block title %}Коды МКБ{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="text-teal"><i class="fas fa-book-medical"></i> Коды МКБ-С</h2>
    <a href="{% url 'app:mkb_create' %}" class="btn btn-success"><i class="fas fa-plus"></i> Добавить код</a>
</div>
<div class="card card-custom">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light"><tr><th>Код</th><th>Название</th><th>Категория</th><th></th></tr></thead>
            <tbody>
            {% for c in codes %}
                <tr>
                    <td class="fw-bold">{{ c.code }}</td>
                    <td>{{ c.name }}</td>
                    <td>{{ c.get_category_display }}</td>
                    <td>
                        <a href="{% url 'app:mkb_edit' c.id %}" class="btn btn-sm btn-outline-warning"><i class="fas fa-edit"></i></a>
                        <a href="{% url 'app:mkb_delete' c.id %}" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></a>
                    </td>
                </tr>
            {% empty %}
                <tr><td colspan="4" class="text-center text-muted py-4">Коды не найдены</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
