{% extends 'base.html' %}
{% block title %}Услуги из FastAPI{% endblock %}
{% block content %}
<h2 class="text-teal mb-3"><i class="fas fa-cloud"></i> Услуги (из FastAPI)</h2>
{% if services %}
<div class="card card-custom">
  <table class="table table-hover mb-0">
    <thead class="table-light"><tr><th>Код</th><th>Название</th></tr></thead>
    <tbody>
      {% for s in services %}
      <tr><td>{{ s.code }}</td><td>{{ s.name }}</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<div class="alert alert-warning">Данные недоступны — проверьте, запущен ли FastAPI.</div>
{% endif %}
{% endblock %}
