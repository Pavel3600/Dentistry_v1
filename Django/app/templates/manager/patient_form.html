{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card card-custom p-4">
            <h3 class="mb-4 text-teal"><i class="fas fa-user-plus"></i> {{ title }}</h3>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">ФИО Пациента</label>
                    {{ form.full_name }}
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Дата рождения</label>
                        {{ form.birth_date }}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Пол</label>
                        {{ form.gender }}
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Телефон</label>
                    {{ form.phone }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Адрес</label>
                    {{ form.address }}
                </div>
                <button type="submit" class="btn btn-primary w-100">Сохранить пациента</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
