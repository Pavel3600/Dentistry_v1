{% extends 'base.html' %}
{% block content %}
{% if validlink %}
<h2>Введите новый пароль</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Сменить пароль</button>
</form>
{% else %}
<p>Ссылка недействительна.</p>
{% endif %}
{% endblock %}
