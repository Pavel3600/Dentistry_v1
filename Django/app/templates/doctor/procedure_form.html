{% extends 'base.html' %}
{% block content %}
<h2>Добавление манипуляции</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Добавить</button>
    {% if appointment_id %}<a href="{% url 'app:appointment_detail' appointment_id %}" class="btn btn-secondary">Отмена</a>{% endif %}
</form>
{% endblock %}
