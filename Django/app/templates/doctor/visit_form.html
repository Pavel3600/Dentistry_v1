{% extends 'base.html' %}
{% block content %}
<h2>Осмотр пациента {{ appointment.patient.full_name }}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Завершить приём</button>
    <a href="{% url 'app:appointment_detail' appointment.pk %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
